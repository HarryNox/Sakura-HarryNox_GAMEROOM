name: Deploy Game Room to GitHub Pages

on:
  # Runs on pushes targeting the default branch
  push:
    branches: ["main", "master"]

  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

# Sets permissions of the GITHUB_TOKEN to allow deployment to GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent deployment, skipping runs queued between the run in-progress and latest queued.
# However, do NOT cancel in-progress runs as we want to allow these production deployments to complete.
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  # Build job
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive # Fetch submodules
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Setup Pages
        uses: actions/configure-pages@v4

      # 1. Build the Main Portal App
      - name: Install dependencies
        run: npm ci

      - name: Build Portal
        run: npm run build

      # 2. Integrate Static Games
      - name: Copy Static Games
        run: |
          mkdir -p dist/games
          # Copy static games as they are
          cp -r games/harrynox-sakura-gamelab dist/games/
          cp -r games/BalanceBird dist/games/

      # 3. Build Vite Game (re_kanetsukirush)
      - name: Build re_kanetsukirush
        run: |
          cd games/re_kanetsukirush
          npm ci
          # Override the base URL during build for the subfolder
          npm run build -- --base=/Sakura-HarryNox_GAMEROOM/games/re_kanetsukirush/
          # Copy the build output to the portal's dist folder
          cp -r dist ../../dist/games/re_kanetsukirush

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: './dist'

  # Deployment job
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
