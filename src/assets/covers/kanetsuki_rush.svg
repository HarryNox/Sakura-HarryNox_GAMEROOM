<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <rect width="400" height="400" fill="#0f172a"/>
  <!-- Action Lines -->
  <line x1="200" y1="200" x2="300" y2="100" stroke="#f43f5e" stroke-width="4" opacity="0.5" stroke-dasharray="10 5"/>
  
  <!-- Bell -->
  <g transform="translate(250, 150) rotate(15)">
    <!-- Handle -->
    <circle cx="0" cy="-80" r="15" fill="#eab308" stroke="#ca8a04" stroke-width="3"/>
    <!-- Top Trapezoid -->
    <polygon points="-20,-80 20,-80 40,50 -40,50" fill="#eab308" stroke="#ca8a04" stroke-width="3"/>
    <!-- Rim -->
    <rect x="-55" y="40" width="110" height="30" rx="10" fill="#eab308" stroke="#ca8a04" stroke-width="3"/>
  </g>
  
  <!-- Block -->
  <rect x="100" y="180" width="60" height="60" fill="#10b981" stroke="#fff" stroke-width="2"/>
  
  <!-- Ball -->
  <circle cx="150" cy="250" r="20" fill="#38bdf8"/>
  
  <!-- Motion Blur/Trail for ball -->
  <circle cx="120" cy="280" r="15" fill="#38bdf8" opacity="0.5"/>
  <circle cx="90" cy="310" r="10" fill="#38bdf8" opacity="0.2"/>
</svg>
