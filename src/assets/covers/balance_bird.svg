<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <rect width="400" height="400" fill="#0f172a"/>
  <!-- Decorative background birds -->
  <circle cx="100" cy="80" r="12" fill="#94a3b8" opacity="0.5"/>
  <circle cx="320" cy="150" r="18" fill="#1e293b" opacity="0.5"/>
  <circle cx="200" cy="350" r="15" fill="#d6d3d1" opacity="0.5"/>
  
  <!-- Hand -->
  <rect x="150" y="320" width="100" height="30" fill="#38bdf8" rx="5"/>
  
  <!-- Stick -->
  <rect x="192" y="100" width="16" height="220" fill="#d97706"/>
  
  <!-- Main Bird (Woodpecker - Red) -->
  <g transform="translate(160, 180)">
    <circle cx="0" cy="0" r="25" fill="#ef4444"/>
    <polygon points="23,-2 45,0 23,2" fill="#fbbf24"/>
    <circle cx="8" cy="-8" r="4" fill="#000"/>
  </g>
</svg>
